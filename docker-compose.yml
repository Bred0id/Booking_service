services:
  db:
    image: postgres:16-alpine
    env_file: .env
    ports: 
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Project"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s


  app:
    build: ./app
    env_file: .env
    ports: 
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: